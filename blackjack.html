<!DOCTYPE html>
<html>
<style>


    
    body {
    background-color: rgb(0, 66, 128);  
    margin: 0px;  
    height: 100vh;
    
    display: grid;
    place-items: center;
  }
  
  .card-groups,
  .card-group,
  .card {
    aspect-ratio: 6 / 7;
  }
  
  .card-groups,
  .card-group,
  .big-card {  
    width: 30vmin;
  }
  
  .card-group {
    position: absolute;
    transition: transform 400ms ease;
  }
  
  .card-group[data-status="unknown"] {
    transform: scale(0);
    transition: none;
  }
  
  .card {
    background-color: rgba(255, 255, 255, 0.05);
    position: absolute;
    transition: transform 800ms cubic-bezier(.05,.43,.25,.95);
    background-position: center;
    background-size: cover;
  }
  
  .big-card {
    border-radius: 1vmin;
  }

  
  .big-card:nth-child(1) {
    background-image: url("https://i.pinimg.com/originals/19/6e/f8/196ef8bd318feca65c38d07ef174c6ad.jpg");
   
  }
  
  .big-card:nth-child(2) {
    background-image: url("https://quotetheanime.com/wp-content/uploads/2021/09/Kento-Nanami-Table.jpg");

  }
  
  .big-card:nth-child(3) {
    background-image: url("https://preview.redd.it/i-found-gojo-as-hand-sanitizer-v0-qkm5d0s1vasc1.jpeg?width=3024&format=pjpg&auto=webp&s=151852f81de304c2211525853cac8e3f8fa8d75c");

  }
  
  .big-card:nth-child(4) {
    background-image: url("https://i.pinimg.com/originals/1b/7e/5a/1b7e5a345f8c80e3597cbf55e1ee8368.jpg");

  }

  

  .card-group:hover > .card {  
    box-shadow: -2vmin 2vmin 3vmin rgba(0, 0, 0, 0.4);
  }
  
  .card-group:hover > .big-card:nth-child(1) {
    transform:  rotate(-24deg); transform-origin: 0 340px; 
  }

  .big-card:nth-child(1):hover {
    transform:  rotate(-24deg); transform-origin: 0 340px; opacity: 0.5; }
  
  .card-group:hover > .big-card:nth-child(2) {
    transform:  rotate(-8deg); transform-origin: 0 340px; 
  }

  .big-card:nth-child(2):hover {
    transform:  rotate(-24deg); transform-origin: 0 340px; opacity: 0.5; }
  
  .card-group:hover > .big-card:nth-child(3) {
    transform: rotate(8deg); transform-origin: 0 340px; 
  }
  
  .big-card:nth-child(3):hover {
    transform:  rotate(-24deg); transform-origin: 0 340px; opacity: 0.5; }
  
  .card-group:hover > .big-card:nth-child(4) {
    transform: rotate(24deg); transform-origin: 0 340px; 
  }

  .big-card:nth-child(4):hover {
    transform:  rotate(-24deg); transform-origin: 0 340px; opacity: 0.5; }
  
  

</style>
<body>
 

    <div class="table">
        <div class="card-origin" id="cardOrigin"></div>

    <div class="card-groups">
        <div class="card-group" data-index="0" data-status="active">

          <div class="big-card card">
    
          </div>

          <div class="big-card card">
    
          </div>

          <div class="big-card card">
    
          </div>

          <div class="big-card card">
          </div>
        </div>
      </div>
    </div>
</body>

</html>
