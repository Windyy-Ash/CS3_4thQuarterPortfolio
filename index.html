<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Ashley Karenina Villena's Portfolio</title>
	<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
	<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./port.css">
	<style>
		body {
			background: #ffc1cc;
			font-family: 'Quicksand', Arial, sans-serif;
			margin: 0;
			padding: 0;
		}
		.portfolio-container {
			background: #e6c6fa;
			padding: 32px 24px;
			border-radius: 32px;
			max-width: 1000px;
			margin: 40px auto 32px auto;
			text-align: center;
			box-shadow: 0 4px 48px 0 #ffb6c1;
		}
		.main-title {
			font-family: 'Pacifico', cursive;
			font-size: 2.5em;
			color: #a020f0;
			margin-bottom: 16px;
		}

		.quarters-grid {
			display: grid;
			grid-template-columns: minmax(0, 520px);
			justify-content: center;
			gap: 20px;
			margin-top: 32px;
			align-items: start;
		}

		.quarter-box {
			background: linear-gradient(180deg, #ffebf3 0%, #ffd6ea 100%);
			border-radius: 20px;
			padding: 20px;
			box-shadow: 0 8px 30px rgba(255,182,193,0.15);
			text-align: left;
			min-height: 180px;
			transition: transform 0.18s ease, box-shadow 0.18s ease;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.quarter-box:hover {
			transform: translateY(-6px);
			box-shadow: 0 14px 40px rgba(236,72,153,0.18);
		}

		.quarter-box h2 {
			margin: 0;
			color: #a020f0;
			font-size: 1.2em;
		}

		.quarter-content {
			margin-top: 6px;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.quarter-link {
			display: inline-block;
			background: #ffb6d5;
			color: #a020f0;
			border: none;
			border-radius: 28px;
			padding: 10px 14px;
			font-size: 0.95em;
			font-weight: 600;
			text-decoration: none;
			box-shadow: 0 2px 16px #ffb6c1;
			transition: background 0.18s, color 0.18s;
		}
		.quarter-link:hover {
			background: #ec4899;
			color: #fff;
		}

		.quarter-empty {
			color: #7a2fa3;
			font-style: italic;
			padding: 8px 4px;
		}

		@media (max-width: 900px) {
			.quarters-grid { grid-template-columns: minmax(0, 1fr); }
		}
	</style>
</head>
<body>
	<section class="portfolio-container">
		<h1 class="main-title">Ashley's Work and Exercises!!</h1>

		<div class="quarters-grid">
			<div class="quarter-box" aria-labelledby="q4-heading">
				<h2 id="q4-heading">4th Quarter</h2>
				<div class="quarter-content">
					<a class="quarter-link" href="./public/quarter4/q4lgRubidiumVillena1.html">Q4 1st & 2nd Graded Exercises</a>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
